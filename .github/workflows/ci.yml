name: CI pipeline

on:
  push:
    branches: ["main"]
env:
  DOCKER_USERNAME: ${{secrets.DOCKER_USERNAME}}
  DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
  DATABASE_USER: ${{secrets.DATABASE_USER}}
  DATABASE_PASSWORD: ${{secrets.DATABASE_PASSWORD}}
  DATABASE_HOST: ${{secrets.DATABASE_HOST}}
  DATABASE_NAME: ${{secrets.DATABASE_NAME}}

jobs:
  migration:
    name: DB Migration and Seed
    runs-on: [self-hosted, migration-runner]

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: DB Migration Status
        id: status_db_migration
        shell: bash
        run: |
          cd database/migrations
          goose mysql "$DATABASE_USER:$DATABASE_PASSWORD@tcp($DATABASE_HOST:3306)/$DATABASE_NAME?parseTime=true" status

      - name: Run DB Migration
        id: run_db_migration
        shell: bash
        run: |
          cd database/migrations
          goose mysql "$DATABASE_USER:$DATABASE_PASSWORD@tcp($DATABASE_HOST:3306)/$DATABASE_NAME?parseTime=true" up
      - name: DB Seeders Status
        id: status_db_seeder
        shell: bash
        run: |
          cd database/seeders
          goose mysql "$DATABASE_USER:$DATABASE_PASSWORD@tcp($DATABASE_HOST:3306)/$DATABASE_NAME?parseTime=true" status

      - name: Run DB Seeder
        id: run_db_seeder
        shell: bash
        run: |
          cd database/seeders
          goose mysql "$DATABASE_USER:$DATABASE_PASSWORD@tcp($DATABASE_HOST:3306)/$DATABASE_NAME?parseTime=true" up

  build:
    runs-on: ubuntu-latest
    needs: migration
    steps:
      - uses: actions/checkout@v3
      - name: login Dockerhub
        run: docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD

      - name: Build the Docker image
        run: docker build -t rohanchauhan02/loan-service .
      - name: Push to Dockerhub
        run: docker push rohanchauhan02/loan-service:latest
